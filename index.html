  <body>
    <div id="root"></div>

    <!-- Crisp Chat -->
    <script type="text/javascript">
      window.$crisp = [];
      window.CRISP_WEBSITE_ID = "TU-WEBSITE-ID-AQUI"; // Reemplaza con tu ID de Crisp

      // Configuración del chat
      window.$crisp.push(["set", "session:segments", [["web-visitor"]]]);

      // Mensaje de bienvenida automático tras 8 segundos
      window.$crisp.push(["on", "session:loaded", function () {
        setTimeout(function () {
          window.$crisp.push(["do", "message:show", [
            "text",
            "👋 ¡Hola! ¿Buscas más clientes para tu negocio? Cuéntame qué necesitas y te ayudo ahora mismo."
          ]]);
        }, 8000);
      }]);

      (function () {
        var d = document;
        var s = d.createElement("script");
        s.src = "https://client.crisp.chat/l.js";
        s.async = 1;
        d.getElementsByTagName("head")[0].appendChild(s);
      })();
    </script>
